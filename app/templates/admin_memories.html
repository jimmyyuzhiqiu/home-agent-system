{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>记忆审计（只读，最近 800 条）</h2>
  <table>
    <tr><th>时间</th><th>用户</th><th>类型</th><th>来源</th><th>内容</th></tr>
    {% for m, u in entries %}
    <tr>
      <td>{{ m.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
      <td>{{ u.username }}</td>
      <td>{{ m.kind }}</td>
      <td>{{ m.source }}</td>
      <td style="max-width:560px;word-break:break-all;">{{ m.content }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
