{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:480px;margin:40px auto;">
  <h2>家庭多用户 AI Agent 登录</h2>
  <p class="muted">支持管理员与普通用户独立会话，默认首次登录后建议尽快改密。</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div><input name="username" placeholder="用户名" required></div>
    <div><input name="password" type="password" placeholder="密码" required></div>
    <button type="submit" style="width:100%;margin-top:8px;">登录</button>
  </form>
</div>
{% endblock %}
