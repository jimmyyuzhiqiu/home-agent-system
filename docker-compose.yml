services:
  app:
    build: ./app
    container_name: home-agent-app
    env_file:
      - .env
      - .env.runtime
    volumes:
      - app_data:/data
      - app_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  nginx:
    image: nginx:1.27-alpine
    container_name: home-agent-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  app_data:
    name: home_agent_app_data
  app_uploads:
    name: home_agent_app_uploads
